<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Miss Sejal❤️Mr. Hilk</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        overflow: hidden;
        text-align: center;
        color: white;
    }

    h1 {
        margin-top: 120px;
        font-size: 3rem;
        animation: fadeIn 2s ease-in-out;
    }

    .btn {
        padding: 15px 30px;
        font-size: 20px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        margin: 15px;
        transition: 0.3s;
    }

    #yes {
        background: #00c853;
        color: white;
        box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    #yes:hover {
        transform: scale(1.1);
    }

    #no {
        background: #d50000;
        color: white;
        position: absolute;
    }

    /* Heart screen */
    #loveScreen {
        display: none;
        height: 100vh;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    .heart {
        font-size: 80px;
        animation: heartbeat 1s infinite;
    }

    /* Floating hearts */
    .floating-heart {
        position: absolute;
        color: white;
        font-size: 20px;
        animation: float 6s linear infinite;
    }

    @keyframes float {
        0% {
            transform: translateY(100vh);
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh);
            opacity: 0;
        }
    }

    @keyframes heartbeat {
        0% { transform: scale(1); }
        25% { transform: scale(1.2); }
        50% { transform: scale(1); }
        75% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

</style>
</head>

<body>

<h1>Will you be My Valentine? ❤️</h1>

<button id="yes" class="btn">Yes 💖</button>
<button id="no" class="btn">No 😢</button>

<div id="loveScreen">
    <div class="heart">❤️</div>
    <h1>I Love You Miss Sejal💕</h1>
    <h1>From Mr. Hulk</h1>
</div>

<!-- Background Music -->
<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const loveScreen = document.getElementById("loveScreen");
    const music = document.getElementById("music");

    // Move NO button
    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 100);
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    // YES button click
    yesBtn.addEventListener("click", () => {
        document.body.innerHTML = "";
        document.body.appendChild(loveScreen);
        loveScreen.style.display = "flex";
        music.play();

        // Create floating hearts
        setInterval(() => {
            const heart = document.createElement("div");
            heart.classList.add("floating-heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 30 + 20 + "px";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }, 300);
    });

    // Autoplay fix (user interaction required)
    document.body.addEventListener("click", () => {
        music.play();
    }, { once: true });

</script>

</body>
</html>
